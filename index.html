<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <title>Document</title>
</head>
<body>
    <h1>Hello Barcodes i love you all!</h1>
    <div id="video"></div>

    <!--<script src="scripts.js"></script>-->
    <script>
        const html5Qrcode = new Html5Qrcode('video')
        const qrCodeSuccessCallback = (decodedText, decodedResult) => {
            //Manejo de si el codigo es exitosamente escaneado
            alert("Texto del codigo: " + decodedText)
            alert("Resultado: " + JSON.stringify(decodedResult))
            
            html5Qrcode.stop().then((ignore) => {

            }).catch((err) => {

            })
        }

        //Configuraciones de la camara
        const config = {
            fps: 10,
            qrbox: {
                width: 250,
                height: 250
            }
        }
        
        
        html5Qrcode.start({facingMode: 'environment'}, config, qrCodeSuccessCallback)


        

        /*setTimeout(() => {
            html5Qrcode.stop().then((ignore) => {

            }).catch((err) => {

            })
        }, 10000)*/
    </script>
</body>
</html>
