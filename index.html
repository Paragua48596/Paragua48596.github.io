<!DOCTYPE html>
<html>
  <head>
  </head>
  <body>
    <video id="video" height="400px" width="400px" autoplay>
      
      <script>
        
        //Capturamos el elemento de video
        const video = doucument.querySelector('#video')
        
        //Verificamos si el dispositivo tiene camaras
        if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
          const constraints = {
            video: {
                width: {
                    min: 1280,
                },
                height: {
                    min: 720,
                },
                facingMode: {
                    exact: 'environment'    
                }
                
            }
          }
          
           //Empezamos a transmitir la camara en el elemento de video
           navigator.mediaDevices.getUserMedia(constraints).then(stream => video.srcObject = stream);
          
        }
        
      </script>
  </body>
  
</html>
